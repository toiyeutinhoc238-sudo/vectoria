<!doctype html>
<html lang="vi">
  <head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liên hệ - Vectoria</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <script src="js/utils/theme-manager.js"></script>

    <style>
      /* --- 1. BIẾN MÀU SẮC --- */
      :root {
        --primary: #3a78ff;
        --primary-dark: #2563eb;
        --bg-color: #f8fafc;
        --card-bg: #ffffff;
        --text-main: #1e293b;
        --text-sub: #64748b;
        --border: #e2e8f0;
        --grid-color: rgba(58, 120, 255, 0.07);
        --shadow: 0 10px 40px -10px rgba(58, 120, 255, 0.15);
      }

      body.dark {
        --bg-color: #0f1116;
        --card-bg: #161b22;
        --text-main: #e9e9ef;
        --text-sub: #8b949e;
        --border: #30363d;
        --grid-color: rgba(255, 255, 255, 0.05);
        --shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.5);
      }

      /* --- 2. CẤU TRÚC CHUNG --- */
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        font-family: "Inter", sans-serif;
        color: var(--text-main);
        background-color: var(--bg-color);
        background-image:
          linear-gradient(var(--grid-color) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
        background-size: 30px 30px;
        transition:
          background 0.3s,
          color 0.3s;
        overflow-x: hidden;
      }

      .contact-container {
        width: 100%;
        max-width: 460px;
        margin: 20px;
        position: relative;
        z-index: 10;
      }

      .contact-card {
        background: var(--card-bg);
        padding: 40px 35px;
        border-radius: 20px;
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
      }

      .contact-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 6px;
        background: linear-gradient(90deg, var(--primary), #60a5fa);
      }

      .btn-back {
        position: absolute;
        top: 20px;
        left: 20px;
        background: transparent;
        border: none;
        color: var(--text-sub);
        font-size: 1.1rem;
        cursor: pointer;
        transition: 0.2s;
        padding: 8px;
        border-radius: 50%;
      }

      .btn-back:hover {
        color: var(--primary);
        background: rgba(58, 120, 255, 0.1);
      }

      .brand-header {
        text-align: center;
        margin-bottom: 30px;
      }

      .brand-logo {
        max-width: 350px;
        height: auto;
        display: inline-block;
        margin-bottom: 15px;
        transition: filter 0.3s ease;
      }

      body.dark .brand-logo {
        filter: invert(1) hue-rotate(180deg);
      }

      .brand-desc {
        color: var(--text-sub);
        font-size: 0.9rem;
        margin-top: -50px;
      }

      .form-group {
        margin-bottom: 20px;
        position: relative;
      }

      label {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-main);
        margin-bottom: 8px;
        display: block;
      }

      .input-wrapper {
        position: relative;
      }

      .input-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-sub);
        font-size: 0.9rem;
        pointer-events: none;
        transition: 0.2s;
      }

      .input-wrapper.area .input-icon {
        top: 18px;
        transform: none;
      }

      input,
      textarea {
        width: 100%;
        padding: 12px 15px 12px 40px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        background: var(--bg-color);
        color: var(--text-main);
        font-family: inherit;
        font-size: 0.95rem;
        outline: none;
        transition: 0.2s all;
        box-sizing: border-box;
      }

      input:focus,
      textarea:focus {
        border-color: var(--primary);
        background: var(--card-bg);
        box-shadow: 0 0 0 4px rgba(58, 120, 255, 0.1);
      }

      input:focus + .input-icon,
      textarea:focus + .input-icon {
        color: var(--primary);
      }

      textarea {
        min-height: 120px;
        resize: vertical;
        line-height: 1.5;
      }

      .btn-send {
        width: 100%;
        padding: 14px;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-dark)
        );
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 15px rgba(58, 120, 255, 0.3);
      }

      .btn-send:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(58, 120, 255, 0.4);
      }

      .btn-send:active {
        transform: translateY(0);
      }

      .btn-send:disabled {
        opacity: 0.7;
        cursor: wait;
        transform: none;
      }

      #math-canvas-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .math-item {
        position: absolute;
        color: var(--primary);
        opacity: 0.15;
        font-size: 1.5rem;
        transition: color 0.3s;
        user-select: none;
        will-change: transform;
      }

      body.dark .math-item {
        opacity: 0.2;
        color: var(--text-sub);
      }

      /* =========================================================
           POPUP SIÊU CẤP (CSS)
           ========================================================= */
      #static-toast {
        position: fixed;
        top: 30px;
        right: 30px;
        z-index: 999999 !important;

        min-width: 320px;
        background: #fff;
        border-left: 6px solid #2ecc71;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        border-radius: 8px;
        padding: 20px;

        display: flex;
        align-items: center;
        gap: 15px;

        visibility: hidden;
        opacity: 0;
        transform: translateX(50px);
        transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      }

      body.dark #static-toast {
        background: #1e1e1e;
        color: #fff;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      #static-toast.show {
        visibility: visible;
        opacity: 1;
        transform: translateX(0);
      }

      .toast-icon {
        font-size: 24px;
        color: #2ecc71;
      }

      .toast-text h4 {
        margin: 0 0 5px 0;
        font-size: 16px;
        font-weight: 700;
        color: #333;
      }

      .toast-text p {
        margin: 0;
        font-size: 14px;
        color: #666;
      }

      body.dark .toast-text h4 {
        color: #eee;
        color: #eee;
      }

      body.dark .toast-text p {
        color: #aaa;
      }

      /* Thanh đếm ngược */
      .toast-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 4px;
        width: 0%;
        background: #2ecc71;
        border-radius: 0 0 0 8px;
        transition: none;
        /* JS sẽ set transition */
      }

      /* --- CSS UPLOAD FILE --- */
      .file-upload-label {
        display: block;
        cursor: pointer;
        margin-top: 10px;
      }

      .file-upload-design {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 15px;
        border: 1.5px dashed var(--border);
        border-radius: 10px;
        background: var(--bg-color);
        color: var(--text-sub);
        transition: 0.2s;
        font-size: 0.9rem;
      }

      .file-upload-design:hover {
        border-color: var(--primary);
        color: var(--primary);
        background: var(--card-bg);
      }

      /* Khi đã có file */
      .file-upload-design.has-file {
        border-style: solid;
        border-color: #2ecc71;
        background: rgba(46, 204, 113, 0.1);
        color: #27ae60;
      }
    </style>
  </head>

  <body>
    <div id="static-toast">
      <i class="fa-solid fa-circle-check toast-icon"></i>
      <div class="toast-text">
        <h4>Gửi tin nhắn thành công!</h4>
        <p>Cảm ơn bạn đã góp ý :3</p>
      </div>
      <div class="toast-bar"></div>
    </div>
    <div class="contact-container">
      <div class="contact-card">
        <button class="btn-back" onclick="history.back()" title="Quay lại">
          <i class="fa-solid fa-arrow-left"></i>
        </button>

        <div class="brand-header">
          <img
            src="assets/images/logoVec2.png"
            alt="Vectoria Logo"
            class="brand-logo"
          />
          <p class="brand-desc">Hãy cho chúng tôi biết trải nghiệm của bạn.</p>
        </div>

        <form id="contactForm">
          <div class="form-group">
            <label>Tên của bạn</label>
            <div class="input-wrapper">
              <input
                type="text"
                id="user_name"
                placeholder="Ví dụ: Nguyễn Văn A"
                required
              />
              <i class="fa-regular fa-user input-icon"></i>
            </div>
          </div>

          <div class="form-group">
            <label>Email liên hệ</label>
            <div class="input-wrapper">
              <input
                type="email"
                id="user_email"
                placeholder="abc@example.com"
                required
              />
              <i class="fa-regular fa-envelope input-icon"></i>
            </div>
          </div>

          <div class="form-group">
            <label>Nội dung tin nhắn</label>
            <div class="input-wrapper area">
              <textarea
                id="message"
                placeholder="Mô tả lỗi hoặc ý tưởng cải thiện web...Có thể là một lời nhắn đầy tình thương!"
                required
              ></textarea>
              <i class="fa-regular fa-comment-dots input-icon"></i>
            </div>
          </div>
          <div class="form-group">
            <input
              type="file"
              id="contactFile"
              class="file-input"
              accept="image/*, .pdf, .doc, .docx"
              hidden
            />
            <label for="contactFile" class="file-upload-label">
              <div class="file-upload-design">
                <i class="fa-solid fa-paperclip"></i>
                <span id="fileNameDisplay"
                  >Đính kèm ảnh/tệp minh họa (Tối đa 5MB)</span
                >
              </div>
            </label>
          </div>
          <button type="submit" class="btn-send" id="btnSubmit">
            <span>Gửi tin nhắn</span>
            <i class="fa-solid fa-paper-plane"></i>
          </button>
        </form>
      </div>
    </div>

    <div id="math-canvas-container"></div>

    <script>
      // --- 1. CẤU HÌNH ĐỊA CHỈ BACKEND (Nhúng trực tiếp để không bị lỗi 404 file JS) ---
      window.App = window.App || {};
      if (
        location.hostname === "127.0.0.1" ||
        location.hostname === "localhost"
      ) {
        App.API_BASE = "http://127.0.0.1:5000";
      } else {
        App.API_BASE = "https://vectoria-3fdh.onrender.com";
      }
      console.log(">> Backend URL hiện tại:", App.API_BASE);

      // --- 2. XỬ LÝ UI ---
      const savedTheme = localStorage.getItem("vec_theme");
      if (savedTheme === "dark") document.body.classList.add("dark");

      const POPUP_TIME = 3000;

      // 1. Xử lý hiển thị tên file khi chọn
      const fileInput = document.getElementById("contactFile");
      const fileNameDisplay = document.getElementById("fileNameDisplay");
      const fileDesign = document.querySelector(".file-upload-design");

      if (fileInput) {
        fileInput.addEventListener("change", function () {
          if (this.files && this.files.length > 0) {
            const file = this.files[0];
            if (file.size > 5 * 1024 * 1024) {
              // 5MB
              alert("File quá lớn! Vui lòng chọn dưới 5MB.");
              this.value = "";
              return;
            }
            fileNameDisplay.textContent = `Đã chọn: ${file.name}`;
            fileDesign.classList.add("has-file");
            fileDesign.querySelector("i").className = "fa-solid fa-check";
          } else {
            fileNameDisplay.textContent =
              "Đính kèm ảnh/tệp minh họa (Tối đa 5MB)";
            fileDesign.classList.remove("has-file");
            fileDesign.querySelector("i").className = "fa-solid fa-paperclip";
          }
        });
      }

      // 2. Xử lý Gửi Form (Dùng FormData thay vì JSON)
      document
        .getElementById("contactForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const btn = document.getElementById("btnSubmit");
          const popup = document.getElementById("static-toast");
          const bar = document.querySelector(".toast-bar");

          // UI Loading
          btn.disabled = true;
          btn.innerHTML =
            '<i class="fa-solid fa-spinner fa-spin"></i> Đang gửi...';
          bar.style.transition = `width ${POPUP_TIME}ms linear`;
          popup.classList.add("show");
          requestAnimationFrame(() => {
            bar.style.width = "100%";
          });

          // Gom dữ liệu vào FormData (để gửi được file)
          const formData = new FormData();
          formData.append(
            "user_name",
            document.getElementById("user_name").value,
          );
          formData.append(
            "user_email",
            document.getElementById("user_email").value,
          );
          formData.append("message", document.getElementById("message").value);

          if (fileInput.files.length > 0) {
            formData.append("attachment", fileInput.files[0]);
          }

          // Gửi đi (Lưu ý: Không set Content-Type header khi dùng FormData)
          setTimeout(() => {
            const sendRequest = (baseUrl) => {
              return fetch(`${baseUrl}/api/contact`, {
                method: "POST",
                body: formData,
              })
              .then(async (response) => {
                if (!response.ok) throw new Error(await response.text());
                return response.json();
              })
              .then((data) => {
                console.log("Thành công:", data);
                window.location.href = "calculation.html";
              });
            };

            sendRequest(App.API_BASE)
              .catch((err) => {
                console.error("Lỗi:", err);
                if (App.API_BASE.includes("127.0.0.1") || App.API_BASE.includes("localhost")) {
                  console.log("Thử gửi liên hệ đến Production Backend...");
                  const fallbackBase = "https://vectoria-3fdh.onrender.com";
                  sendRequest(fallbackBase)
                    .then(() => {
                      App.API_BASE = fallbackBase;
                    })
                    .catch((fallbackErr) => {
                      alert("Lỗi gửi tin: " + fallbackErr.message);
                      btn.disabled = false;
                      btn.innerHTML = "Gửi lại";
                      popup.classList.remove("show");
                    });
                } else {
                  alert("Lỗi gửi tin: " + err.message);
                  btn.disabled = false;
                  btn.innerHTML = "Gửi lại";
                  popup.classList.remove("show");
                }
              });
          }, POPUP_TIME);
        });

      // --- 3. MATH BACKGROUND (Hiệu ứng nền) ---
      const CONFIG = { count: 25, speed: 0.6, repelRadius: 160, repelForce: 6 };
      const icons = [
        '<i class="fa-solid fa-cube"></i>',
        '<i class="fa-solid fa-shapes"></i>',
        '<i class="fa-solid fa-draw-polygon"></i>',
        '<i class="fa-solid fa-vector-square"></i>',
        '<i class="fa-solid fa-layer-group"></i>',
        '<i class="fa-solid fa-compass-drafting"></i>',
        '<i class="fa-solid fa-square-root-variable"></i>',
        '<i class="fa-solid fa-percent"></i>',
        '<i class="fa-solid fa-divide"></i>',
        '<i class="fa-solid fa-infinity"></i>',
        '<i class="fa-solid fa-equals"></i>',
        '<i class="fa-solid fa-less-than-equal"></i>',
        '<i class="fa-solid fa-calculator"></i>',
        '<span style="font-family: serif;">&pi;</span>',
        '<span style="font-family: serif;">&Sigma;</span>',
        '<span style="font-family: serif;">&int;</span>',
        '<span style="font-family: serif;">&oint;</span>',
        '<span style="font-family: serif;">&Delta;</span>',
        '<span style="font-family: serif;">&nabla;</span>',
        '<span style="font-family: serif;">&angle;</span>',
        '<span style="font-family: serif;">&forall;</span>',
      ];
      const container = document.getElementById("math-canvas-container");
      let items = [];
      let mouse = { x: -1000, y: -1000 };
      class MathObject {
        constructor() {
          this.element = document.createElement("div");
          this.element.className = "math-item";
          this.element.innerHTML =
            icons[Math.floor(Math.random() * icons.length)];
          this.element.x = Math.random() * window.innerWidth;
          this.element.y = Math.random() * window.innerHeight;
          this.x = this.element.x;
          this.y = this.element.y; // Fix context
          this.vx = (Math.random() - 0.5) * CONFIG.speed;
          this.vy = (Math.random() - 0.5) * CONFIG.speed;
          this.size = Math.random() * 25 + 25;
          this.element.style.fontSize = `${this.size}px`;
          container.appendChild(this.element);
        }
        update() {
          this.x += this.vx;
          this.y += this.vy;
          const dx = this.x - mouse.x;
          const dy = this.y - mouse.y;
          const distance = Math.sqrt(dx * dx + dy * dy);
          if (distance < CONFIG.repelRadius) {
            const force = (CONFIG.repelRadius - distance) / CONFIG.repelRadius;
            const angle = Math.atan2(dy, dx);
            this.vx += Math.cos(angle) * force * CONFIG.repelForce * 0.1;
            this.vy += Math.sin(angle) * force * CONFIG.repelForce * 0.1;
          }
          const currentSpeed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
          if (currentSpeed > CONFIG.speed) {
            this.vx *= 0.96;
            this.vy *= 0.96;
          }
          if (this.x < -50 || this.x > window.innerWidth + 50) this.vx *= -1;
          if (this.y < -50 || this.y > window.innerHeight + 50) this.vy *= -1;
          this.element.style.transform = `translate3d(${this.x}px, ${this.y}px, 0)`;
        }
      }
      function init() {
        container.innerHTML = "";
        items = [];
        for (let i = 0; i < CONFIG.count; i++) items.push(new MathObject());
        if (!window.animationFrameId) animate();
      }
      function animate() {
        items.forEach((item) => item.update());
        window.animationFrameId = requestAnimationFrame(animate);
      }
      window.addEventListener("mousemove", (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });
      let resizeTimeout;
      window.addEventListener("resize", () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(init, 200);
      });
      init();
    </script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="js/utils/live-collab.js"></script>
  </body>
</html>
