<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập / Đăng ký - Vectoria</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <!-- Google Identity Services client SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
      /* --- 1. BIẾN MÀU SẮC CHUẨN VECTORIA --- */
      :root {
        --primary: #3a78ff;
        --primary-dark: #2563eb;
        --bg-color: #f8fafc;
        --card-bg: #ffffff;
        --text-main: #1e293b;
        --text-sub: #64748b;
        --border: #e2e8f0;
        --grid-color: rgba(58, 120, 255, 0.07);
        --shadow: 0 10px 40px -10px rgba(58, 120, 255, 0.15);
      }

      body.dark {
        --bg-color: #0f1116;
        --card-bg: #161b22;
        --text-main: #e9e9ef;
        --text-sub: #8b949e;
        --border: #30363d;
        --grid-color: rgba(255, 255, 255, 0.05);
        --shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.5);
      }

      /* --- 2. CẤU TRÚC CHUNG --- */
      body {
        display: flex; justify-content: center; align-items: center; min-height: 100vh;
        margin: 0; font-family: "Inter", sans-serif;
        color: var(--text-main); background-color: var(--bg-color);
        background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
        background-size: 30px 30px; transition: background 0.3s, color 0.3s;
        overflow-x: hidden;
      }

      .auth-container { width: 100%; max-width: 460px; margin: 20px; position: relative; z-index: 10; }

      .auth-card {
        background: var(--card-bg); padding: 40px 35px;
        border-radius: 20px; border: 1px solid var(--border);
        box-shadow: var(--shadow); position: relative; overflow: hidden;
      }

      .auth-card::before {
        content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 6px;
        background: linear-gradient(90deg, var(--primary), #60a5fa);
      }

      .btn-back {
        position: absolute; top: 20px; left: 20px; background: transparent;
        border: none; color: var(--text-sub); font-size: 1.1rem;
        cursor: pointer; transition: 0.2s; padding: 8px; border-radius: 50%;
      }
      .btn-back:hover { color: var(--primary); background: rgba(58, 120, 255, 0.1); }

      /* --- LOGO TÙY CHỈNH --- */
      .brand-header { text-align: center; margin-bottom: 25px; }
      .brand-logo {
        max-width: 350px; /* Nhỏ hơn form liên hệ 1 chút cho cân đối */
        height: auto;
        display: inline-block;
        margin-bottom: 10px;
        transition: filter 0.3s ease;
      }
      body.dark .brand-logo { filter: invert(1) hue-rotate(180deg); }
      .brand-desc { color: var(--text-sub); font-size: 0.9rem; margin-top: 5px; }

      /* --- 3. TAB CHUYỂN ĐỔI --- */
      .auth-tabs { display: flex; margin-bottom: 25px; border-bottom: 2px solid var(--border); }
      .auth-tab {
        flex: 1; text-align: center; padding: 12px; cursor: pointer;
        font-weight: 600; color: var(--text-sub); transition: 0.2s;
        border-bottom: 3px solid transparent; margin-bottom: -2px;
      }
      .auth-tab:hover { color: var(--primary); }
      .auth-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

      /* --- 4. FORM INPUTS --- */
      .form-group { margin-bottom: 18px; position: relative; }
      label { font-size: 0.85rem; font-weight: 600; color: var(--text-main); margin-bottom: 8px; display: block; }
      .input-wrapper { position: relative; }
      .input-icon {
        position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
        color: var(--text-sub); font-size: 0.9rem; pointer-events: none; transition: 0.2s;
      }
      input {
        width: 100%; padding: 12px 15px 12px 40px; border: 1.5px solid var(--border);
        border-radius: 10px; background: var(--bg-color); color: var(--text-main);
        font-family: inherit; font-size: 0.95rem; outline: none; transition: 0.2s all; box-sizing: border-box;
      }
      input:focus { border-color: var(--primary); background: var(--card-bg); box-shadow: 0 0 0 4px rgba(58, 120, 255, 0.1); }
      input:focus + .input-icon { color: var(--primary); }

      /* Con mắt xem mật khẩu */
      .toggle-pwd {
        position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
        color: var(--text-sub); font-size: 0.9rem; cursor: pointer; transition: 0.2s;
      }
      .toggle-pwd:hover { color: var(--primary); }
      input.has-pwd-toggle { padding-right: 40px; } /* Chừa chỗ cho con mắt */

      .btn-submit {
        width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600;
        cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 4px 15px rgba(58, 120, 255, 0.3); margin-top: 10px;
      }
      .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(58, 120, 255, 0.4); }
      .btn-submit:active { transform: translateY(0); }
      .btn-submit:disabled { opacity: 0.7; cursor: wait; transform: none; }

      #registerForm { display: none; }

      /* --- 5. TOAST THÔNG BÁO SIÊU CẤP --- */
      #static-toast {
        position: fixed; top: 30px; right: 30px; z-index: 999999 !important;
        min-width: 320px; background: #fff; border-left: 6px solid #2ecc71;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); border-radius: 8px; padding: 20px;
        display: flex; align-items: center; gap: 15px; visibility: hidden; opacity: 0;
        transform: translateX(50px); transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      }
      body.dark #static-toast { background: #1e1e1e; color: #fff; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }
      #static-toast.show { visibility: visible; opacity: 1; transform: translateX(0); }
      .toast-icon { font-size: 24px; color: #2ecc71; }
      .toast-text h4 { margin: 0 0 5px 0; font-size: 16px; font-weight: 700; color: #333; }
      .toast-text p { margin: 0; font-size: 14px; color: #666; }
      body.dark .toast-text h4 { color: #eee; }
      body.dark .toast-text p { color: #aaa; }
      .toast-bar { position: absolute; bottom: 0; left: 0; height: 4px; width: 0%; background: #2ecc71; border-radius: 0 0 0 8px; transition: none; }

      /* --- MATH BACKGROUND --- */
      #math-canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; overflow: hidden; }
      .math-item { position: absolute; color: var(--primary); opacity: 0.15; font-size: 1.5rem; transition: color 0.3s; user-select: none; will-change: transform; }
      body.dark .math-item { opacity: 0.2; color: var(--text-sub); }
    </style>
  </head>
  <body>

    <div id="static-toast">
      <i class="fa-solid fa-circle-check toast-icon"></i>
      <div class="toast-text">
        <h4 id="toastTitle">Thành công!</h4>
        <p id="toastMessage">Đăng nhập thành công</p>
      </div>
      <div class="toast-bar"></div>
    </div>

    <div class="auth-container">
      <div class="auth-card">
        <button class="btn-back" onclick="history.back()" title="Quay lại"><i class="fa-solid fa-arrow-left"></i></button>

        <div class="brand-header">
          <img src="assets/images/logoVec2.png" alt="Vectoria Logo" class="brand-logo" />
        
        </div>

        <div class="auth-tabs">
          <div class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Đăng nhập</div>
          <div class="auth-tab" id="tabRegister" onclick="switchTab('register')">Đăng ký</div>
        </div>

        <form id="loginForm" onsubmit="handleAuth(event, 'login')">
          <div class="form-group">
            <label>Tên đăng nhập</label>
            <div class="input-wrapper">
              <input type="text" id="loginUsername" placeholder="Ví dụ: Khoa K50" required />
              <i class="fa-regular fa-user input-icon"></i>
            </div>
          </div>
          <div class="form-group">
            <label>Mật khẩu</label>
            <div class="input-wrapper">
              <input type="password" id="loginPass" class="has-pwd-toggle" placeholder="••••••••" required />
              <i class="fa-solid fa-lock input-icon"></i>
              <i class="fa-solid fa-eye-slash toggle-pwd" onclick="togglePassword('loginPass', this)" title="Hiện/Ẩn mật khẩu"></i>
            </div>
          </div>
          <button type="submit" class="btn-submit" id="btnLoginSubmit">
            <span>Đăng nhập</span> <i class="fa-solid fa-right-to-bracket"></i>
          </button>
        </form>

        <form id="registerForm" onsubmit="handleAuth(event, 'register')">
          <div class="form-group">
            <label>Tên đăng nhập (Tên hiển thị)</label>
            <div class="input-wrapper">
              <input type="text" id="regName" placeholder="Ví dụ: Khoa K50" required />
              <i class="fa-regular fa-user input-icon"></i>
            </div>
          </div>
          <div class="form-group">
            <label>Email liên hệ</label>
            <div class="input-wrapper">
              <input type="email" id="regEmail" placeholder="abc@example.com" required />
              <i class="fa-regular fa-envelope input-icon"></i>
            </div>
          </div>
          <div class="form-group">
            <label>Mật khẩu</label>
            <div class="input-wrapper">
              <input type="password" id="regPass" class="has-pwd-toggle" placeholder="Tạo mật khẩu" required />
              <i class="fa-solid fa-lock input-icon"></i>
              <i class="fa-solid fa-eye-slash toggle-pwd" onclick="togglePassword('regPass', this)" title="Hiện/Ẩn mật khẩu"></i>
            </div>
          </div>
          <button type="submit" class="btn-submit" id="btnRegSubmit">
            <span>Tạo tài khoản</span> <i class="fa-solid fa-user-plus"></i>
          </button>
        </form>

        <!-- Nút đăng nhập Google -->
        <div style="margin: 20px 0 10px 0; text-align: center; color: var(--text-sub); font-size: 0.9em; border-top: 1px solid var(--border); padding-top: 15px;">
          <span>— Hoặc đăng nhập nhanh bằng —</span>
        </div>
        <div style="display: flex; justify-content: center; margin-bottom: 10px;">
          <!-- Cấu hình Client ID Google (Mặc định dùng Sandbox Client ID của Vectoria, người dùng có thể thay thế bằng của mình) -->
          <div id="g_id_onload"
               data-client_id="114290400611-9ibh3jo7ashjkuolkjta5ksf8sm6l6h2.apps.googleusercontent.com"
               data-context="signin"
               data-ux_mode="popup"
               data-callback="handleGoogleCredential"
               data-auto_prompt="false">
          </div>
          <div class="g_id_signin"
               data-type="standard"
               data-shape="rectangular"
               data-theme="outline"
               data-text="signin_with"
               data-size="large"
               data-logo_alignment="left">
          </div>
        </div>

      </div>
    </div>

    <div id="math-canvas-container"></div>

    <script>
      // 1. ĐỒNG BỘ DARK MODE
      if (localStorage.getItem("vec_theme") === "dark") document.body.classList.add("dark");

      // 2. LOGIC TẮT/MỞ CON MẮT MẬT KHẨU
      function togglePassword(inputId, iconEl) {
        const input = document.getElementById(inputId);
        if (input.type === 'password') {
            input.type = 'text';
            iconEl.classList.remove('fa-eye-slash');
            iconEl.classList.add('fa-eye');
            iconEl.style.color = 'var(--primary)'; // Sáng đèn khi hiện
        } else {
            input.type = 'password';
            iconEl.classList.remove('fa-eye');
            iconEl.classList.add('fa-eye-slash');
            iconEl.style.color = 'var(--text-sub)'; // Tắt đèn khi ẩn
        }
      }

      // 3. LOGIC CHUYỂN TAB
      function switchTab(tab) {
        document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
        document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
        document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
        document.getElementById('authSubtitle').innerText = tab === 'login' ? 'Đăng nhập để đồng bộ dữ liệu' : 'Tạo tài khoản không gian nhóm';
      }

      // 4. HÀM HIỂN THỊ TOAST THÔNG BÁO
      function showToast(message, isSuccess = true) {
        const toast = document.getElementById('static-toast');
        const icon = toast.querySelector('.toast-icon');
        const title = document.getElementById('toastTitle');
        const desc = document.getElementById('toastMessage');
        const bar = toast.querySelector('.toast-bar');

        icon.className = isSuccess ? 'fa-solid fa-circle-check toast-icon' : 'fa-solid fa-circle-xmark toast-icon';
        icon.style.color = isSuccess ? '#2ecc71' : '#e74c3c';
        toast.style.borderLeftColor = isSuccess ? '#2ecc71' : '#e74c3c';
        bar.style.background = isSuccess ? '#2ecc71' : '#e74c3c';
        
        title.innerText = isSuccess ? 'Thành công!' : 'Thất bại!';
        desc.innerText = message;

        toast.classList.add('show');
        bar.style.transition = 'none'; bar.style.width = '0%';
        
        setTimeout(() => { bar.style.transition = 'width 2s linear'; bar.style.width = '100%'; }, 50);
        setTimeout(() => { toast.classList.remove('show'); }, 2000);
      }

      // 5. XỬ LÝ GỌI API BACKEND
      async function handleAuth(event, type) {
        event.preventDefault();
        const btn = type === 'login' ? document.getElementById('btnLoginSubmit') : document.getElementById('btnRegSubmit');
        const originalHtml = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang xử lý...';

        let API_BASE = (location.hostname === "127.0.0.1" || location.hostname === "localhost") 
                          ? "http://127.0.0.1:5000" : "https://vectoria-3fdh.onrender.com";

        const makeRequest = async (baseUrl) => {
            if (type === 'register') {
                const name = document.getElementById('regName').value;
                const email = document.getElementById('regEmail').value;
                const password = document.getElementById('regPass').value;

                const res = await fetch(`${baseUrl}/api/register`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();
                
                if (data.status === 'success') {
                    showToast("Đăng ký thành công! Đang chuyển trang...", true);
                    setTimeout(() => {
                        switchTab('login');
                        document.getElementById('loginUsername').value = name;
                    }, 1500);
                } else {
                    showToast(data.message, false);
                }
            } else {
                const name = document.getElementById('loginUsername').value;
                const password = document.getElementById('loginPass').value;

                const res = await fetch(`${baseUrl}/api/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, password })
                });
                const data = await res.json();

                if (data.status === 'success') {
                    localStorage.setItem('user_token', data.token);
                    localStorage.setItem('user_name', data.name);
                    localStorage.setItem('user_email', data.email);

                    showToast(`Chào mừng ${data.name} trở lại!`, true);
                    
                    setTimeout(() => {
                        const returnUrl = sessionStorage.getItem('redirect_after_login');
                        if (returnUrl) {
                            sessionStorage.removeItem('redirect_after_login');
                            window.location.href = returnUrl;
                        } else {
                            window.location.href = 'user-dashboard.html';
                        }
                    }, 1500);
                } else {
                    showToast(data.message, false);
                }
            }
        };

        try {
            await makeRequest(API_BASE);
        } catch (err) {
            console.error(err);
            if (API_BASE.includes("127.0.0.1") || API_BASE.includes("localhost")) {
                console.log("Thử gửi yêu cầu xác thực đến Production Backend...");
                const fallbackBase = "https://vectoria-3fdh.onrender.com";
                try {
                    await makeRequest(fallbackBase);
                    API_BASE = fallbackBase;
                } catch (fallbackErr) {
                    console.error(fallbackErr);
                    showToast("Lỗi máy chủ! Vui lòng kiểm tra lại kết nối.", false);
                }
            } else {
                showToast("Lỗi máy chủ! Vui lòng kiểm tra lại kết nối.", false);
            }
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalHtml;
        }
      }

      // 5b. XỬ LÝ ĐĂNG NHẬP GOOGLE SSO
      async function handleGoogleCredential(response) {
        console.log(">> Nhận Google Credential Token");
        const token = response.credential;
        
        let API_BASE = (location.hostname === "127.0.0.1" || location.hostname === "localhost") 
                          ? "http://127.0.0.1:5000" : "https://vectoria-3fdh.onrender.com";

        const makeGoogleRequest = async (baseUrl) => {
            const res = await fetch(`${baseUrl}/api/google_login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token })
            });
            const data = await res.json();
            
            if (data.status === 'success') {
                localStorage.setItem('user_token', data.token);
                localStorage.setItem('user_name', data.name);
                localStorage.setItem('user_email', data.email);

                showToast(`Chào mừng ${data.name} đăng nhập bằng Google!`, true);
                
                setTimeout(() => {
                    const returnUrl = sessionStorage.getItem('redirect_after_login');
                    if (returnUrl) {
                        sessionStorage.removeItem('redirect_after_login');
                        window.location.href = returnUrl;
                    } else {
                        window.location.href = 'user-dashboard.html';
                    }
                }, 1500);
            } else {
                showToast(data.message, false);
            }
        };

        try {
            await makeGoogleRequest(API_BASE);
        } catch (err) {
            console.error(err);
            if (API_BASE.includes("127.0.0.1") || API_BASE.includes("localhost")) {
                console.log("Thử gửi xác thực Google đến Production Backend...");
                const fallbackBase = "https://vectoria-3fdh.onrender.com";
                try {
                    await makeGoogleRequest(fallbackBase);
                } catch (fallbackErr) {
                    console.error(fallbackErr);
                    showToast("Đăng nhập Google thất bại! Vui lòng kiểm tra lại kết nối.", false);
                }
            } else {
                showToast("Đăng nhập Google thất bại! Vui lòng kiểm tra lại kết nối.", false);
            }
        }
      }

      // 6. HIỆU ỨNG NỀN TOÁN HỌC (Copy y nguyên từ Contact)
      const CONFIG = { count: 20, speed: 0.6, repelRadius: 160, repelForce: 6 };
      const icons = [ '<i class="fa-solid fa-cube"></i>', '<i class="fa-solid fa-shapes"></i>', '<i class="fa-solid fa-vector-square"></i>', '<i class="fa-solid fa-layer-group"></i>', '<i class="fa-solid fa-square-root-variable"></i>', '<span style="font-family: serif;">&pi;</span>', '<span style="font-family: serif;">&Sigma;</span>', '<span style="font-family: serif;">&int;</span>', '<span style="font-family: serif;">&Delta;</span>' ];
      const container = document.getElementById("math-canvas-container");
      let items = []; let mouse = { x: -1000, y: -1000 };
      class MathObject {
        constructor() {
          this.element = document.createElement("div"); this.element.className = "math-item";
          this.element.innerHTML = icons[Math.floor(Math.random() * icons.length)];
          this.x = Math.random() * window.innerWidth; this.y = Math.random() * window.innerHeight;
          this.vx = (Math.random() - 0.5) * CONFIG.speed; this.vy = (Math.random() - 0.5) * CONFIG.speed;
          this.element.style.fontSize = `${Math.random() * 25 + 25}px`;
          container.appendChild(this.element);
        }
        update() {
          this.x += this.vx; this.y += this.vy;
          const dx = this.x - mouse.x, dy = this.y - mouse.y; const distance = Math.sqrt(dx*dx + dy*dy);
          if (distance < CONFIG.repelRadius) {
            const force = (CONFIG.repelRadius - distance) / CONFIG.repelRadius;
            const angle = Math.atan2(dy, dx);
            this.vx += Math.cos(angle) * force * CONFIG.repelForce * 0.1;
            this.vy += Math.sin(angle) * force * CONFIG.repelForce * 0.1;
          }
          if (Math.sqrt(this.vx*this.vx + this.vy*this.vy) > CONFIG.speed) { this.vx *= 0.96; this.vy *= 0.96; }
          if (this.x < -50 || this.x > window.innerWidth + 50) this.vx *= -1;
          if (this.y < -50 || this.y > window.innerHeight + 50) this.vy *= -1;
          this.element.style.transform = `translate3d(${this.x}px, ${this.y}px, 0)`;
        }
      }
      function init() {
        container.innerHTML = ""; items = [];
        for (let i = 0; i < CONFIG.count; i++) items.push(new MathObject());
        if (!window.animationFrameId) animate();
      }
      function animate() { items.forEach(item => item.update()); window.animationFrameId = requestAnimationFrame(animate); }
      window.addEventListener("mousemove", (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
      window.addEventListener("resize", () => { clearTimeout(window.resizeTimeout); window.resizeTimeout = setTimeout(init, 200); });
      init();
    </script>
  </body>
</html>
